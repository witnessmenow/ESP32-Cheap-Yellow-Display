; PlatformIO project for LCDWIKI E32R40T (ESP32-32E + ST7796 4.0" 480x320 + XPT2046 touch)
; Target backend: vm-switcher-api (see the backend/ folder in this example)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
monitor_filters = esp32_exception_decoder

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.4.2

; TFT_eSPI is configured via the project-local include/User_Setup.h (overrides
; the one in the library). USER_SETUP_LOADED=1 stops the library from looking
; at its own configs.
build_flags =
    -DUSER_SETUP_LOADED=1
    -include include/User_Setup.h
    -DCORE_DEBUG_LEVEL=3
